name: Update Dongtan Bag Shop Data

on:
  schedule:
    # KST 06:00~24:00 (2시간마다) = UTC 21:00, 23:00, 01:00, 03:00, 05:00, 07:00, 09:00, 11:00, 13:00, 15:00
    - cron: '0 21,23,1,3,5,7,9,11,13,15 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests urllib3

    - name: Fetch and update data
      run: python fetch_data.py

    - name: Deploy to Firebase
      uses: w9jds/firebase-action@master
      with:
        args: deploy --only hosting --project dongtan-bag-shop
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    - name: Log update
      run: |
        echo "데이터 갱신 완료: $(date)"
        echo "총 판매점: $(cat shops.json | grep -o '"total_count": [0-9]*' | grep -o '[0-9]*')"
