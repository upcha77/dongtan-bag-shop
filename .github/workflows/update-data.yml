name: Update Dongtan Bag Shop Data

on:
  schedule:
    # 2시간마다 실행: 06:00, 08:00, 10:00, 12:00, 14:00, 16:00, 18:00, 20:00, 22:00, 24:00(00:00)
    - cron: '0 6,8,10,12,14,16,18,20,22,0 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests urllib3

    - name: Fetch and update data
      run: python fetch_data.py

    - name: Deploy to Firebase
      uses: w9jds/firebase-action@master
      with:
        args: deploy --only hosting --project dongtan-bag-shop
      env:
        FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

    - name: Log update
      run: |
        echo "데이터 갱신 완료: $(date)"
        echo "총 판매점: $(cat shops.json | grep -o '"total_count": [0-9]*' | grep -o '[0-9]*')"
